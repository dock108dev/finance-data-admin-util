name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ── Test API ─────────────────────────────────────────────────────────
  test-api:
    name: Test API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          uv venv --python ${{ env.PYTHON_VERSION }}
          uv pip install -e ./api
          uv pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run tests with coverage
        working-directory: api
        env:
          PYTHONPATH: .
        run: |
          source ../.venv/bin/activate
          pytest tests/ -v \
            --cov=app \
            --cov-config=pyproject.toml \
            --cov-report=term-missing \
            --cov-fail-under=90

  # ── Test Scraper ─────────────────────────────────────────────────────
  test-scraper:
    name: Test Scraper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          uv venv --python ${{ env.PYTHON_VERSION }}
          uv pip install -e ./scraper
          uv pip install pytest pytest-cov

      - name: Run tests with coverage
        working-directory: scraper
        run: |
          source ../.venv/bin/activate
          pytest tests/ -v \
            --cov=fin_scraper \
            --cov-config=pyproject.toml \
            --cov-report=term-missing \
            --cov-fail-under=80

  # ── Lint & Type-check Web ────────────────────────────────────────────
  lint-web:
    name: Lint Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

  # ── Compile ──────────────────────────────────────────────────────────
  compile:
    name: Compile
    runs-on: ubuntu-latest
    needs: [test-api, test-scraper, lint-web]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Compile API
        run: python -m compileall api/app/

      - name: Compile Scraper
        run: python -m compileall scraper/fin_scraper/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Build Web
        working-directory: web
        run: |
          npm ci
          npm run build

  # ── Build Docker Images ──────────────────────────────────────────────
  build:
    name: Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [compile]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: api
            dockerfile: infra/api.Dockerfile
          - service: web
            dockerfile: infra/web.Dockerfile
          - service: scraper
            dockerfile: infra/scraper.Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: tags
        run: |
          REPO="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}"
          SHORT_SHA="${GITHUB_SHA::7}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PRIMARY="${REPO}:pr-${{ github.event.number }}-${SHORT_SHA}"
          else
            PRIMARY="${REPO}:${SHORT_SHA}"
          fi
          {
            echo "tags<<EOF"
            echo "${PRIMARY}"
            echo "${REPO}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy ───────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            git pull origin main

            # Pull latest images
            docker compose --profile prod pull

            # Run migrations
            docker compose --profile prod run --rm migrate

            # Start/restart services
            docker compose --profile prod up -d --remove-orphans

            # Reload Caddy if config changed
            docker compose --profile prod exec -T caddy caddy reload --config /etc/caddy/Caddyfile 2>/dev/null || true

            # Cleanup old images
            docker image prune -af --filter "until=168h"

            echo "Deploy complete: $(date)"
